<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Initiative Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎲 Initiative Tracker</h1>

        <!-- Selezione modalità -->
        <div class="section mode-section">
            <h2>Modalità di gioco</h2>
            <div class="mode-buttons">
                <button class="btn btn-mode active" data-mode="dnd">⚔️ D&D</button>
                <button class="btn btn-mode" data-mode="fabula">📖 Fabula Ultima</button>
                <button class="btn btn-mode" data-mode="pbta">🎭 PbtA</button>
                <button class="btn btn-mode" data-mode="7thsea">🏴‍☠️ 7th Sea</button>
            </div>
            <p class="mode-description" id="modeDescription"></p>
        </div>

        <!-- Aggiunta personaggio -->
        <div class="section add-section">
            <h2>Aggiungi Personaggio</h2>
            <div class="input-row" id="addInputs">
                <!-- Generati dinamicamente in base alla modalità -->
            </div>
            <button id="addBtn" class="btn btn-add">Aggiungi</button>
        </div>

        <!-- Controlli round/turno -->
        <div class="section round-section">
            <h2 id="roundLabel">Round: <span id="roundCounter">1</span></h2>
            <div class="round-controls">
                <button id="nextTurnBtn" class="btn btn-turn">Prossimo Turno ▶</button>
                <button id="resetBtn" class="btn btn-reset">Reset ✕</button>
            </div>
        </div>

        <!-- Lista personaggi -->
        <div class="tracker-list" id="trackerList"></div>

        <!-- Sezione azioni (D&D: cura/attacco | 7th Sea: modifica raises) -->
        <div class="section action-section" id="actionSection" style="display: none;">
            <h2 id="actionTitle">Azione</h2>
            <div class="input-row">
                <select id="targetSelect">
                    <option value="">-- Seleziona bersaglio --</option>
                </select>
                <input type="number" id="actionValue" placeholder="Valore" min="0">
            </div>
            <div class="action-buttons" id="actionButtons">
                <!-- Generati dinamicamente -->
            </div>
        </div>

        <!-- Sezione PbtA: scelta del master -->
        <div class="section pbta-section" id="pbtaSection" style="display: none;">
            <h2>Turno di:</h2>
            <div class="pbta-select-row">
                <select id="pbtaSelect">
                    <option value="">-- Scegli chi agisce --</option>
                </select>
                <button id="pbtaConfirmBtn" class="btn btn-turn">Conferma</button>
            </div>
        </div>

        <!-- Fabula Ultima: scelta fazione -->
        <div class="section fabula-section" id="fabulaSection" style="display: none;">
            <h2>Prossimo turno: <span id="fabulaFaction">Eroi</span></h2>
            <div class="fabula-controls">
                <select id="fabulaSelect">
                    <option value="">-- Scegli chi agisce --</option>
                </select>
                <button id="fabulaConfirmBtn" class="btn btn-turn">Conferma</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
