<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Initiative Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@400;600&family=Orbitron:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-main">
            <h1>INITIATIVE TRACKER</h1>
            <button id="btn-settings" class="btn-icon">⚙️</button>
        </div>
        <div class="header-sub">
            <span id="round-display">Round: 1</span> | <span id="mode-display">D&D</span>
        </div>
    </header>

    <main id="app">
        <div id="active-banner" class="active-banner">
            <div id="active-name">NESSUN TURNO ATTIVO</div>
            <button id="btn-next" class="btn-next-turn">PROSSIMO TURNO</button>
        </div>
        <div id="combatant-list"></div>
        <button id="btn-add" class="btn-primary" style="margin-top: 1rem;">+ AGGIUNGI COMBATTENTE</button>
    </main>

    <footer id="footer">
        <p>Creato da Noemi Marcolini</p>
        <div class="links">
            <a href="https://ko-fi.com/noemimarcolini">☕ Ko-fi</a>
            <a href="https://gdr-sys-portfolio2026.vercel.app/">🎲 Portfolio</a>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
